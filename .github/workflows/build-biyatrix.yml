name: Build Biyatrix

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Get version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./packages/opencode/package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: bun install
        env:
          OPENCODE_VERSION: ${{ steps.version.outputs.version }}
          OPENCODE_CHANNEL: "latest"

      - name: Build all platform binaries
        run: bun run packages/opencode/script/build.ts
        env:
          OPENCODE_VERSION: ${{ steps.version.outputs.version }}
          OPENCODE_CHANNEL: "latest"

      - name: Repackage with biyatrix naming
        run: |
          mkdir -p release
          RELEASE_DIR="$PWD/release"
          for dir in packages/opencode/dist/opencode-*/; do
            platform=$(basename "$dir")
            platform=${platform#opencode-}
            target="biyatrix-${platform}"

            if [[ "$platform" == linux* ]]; then
              tar -czf "${RELEASE_DIR}/${target}.tar.gz" -C "${dir}bin" .
            else
              (cd "${dir}bin" && zip -r "${RELEASE_DIR}/${target}.zip" .)
            fi
          done
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "biyatrix v${{ steps.version.outputs.version }}"
          files: release/*
          draft: false
          prerelease: false
