name: Build Biyatrix

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        env:
          OPENCODE_VERSION: "0.1.0"
          OPENCODE_CHANNEL: "latest"

      - name: Build all platform binaries
        run: bun run packages/opencode/script/build.ts
        env:
          OPENCODE_VERSION: "0.1.0"
          OPENCODE_CHANNEL: "latest"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          name: "biyatrix v0.1.0"
          files: |
            packages/opencode/dist/*/bin/biyatrix
            packages/opencode/dist/*/bin/biyatrix.exe
          draft: false
          prerelease: false
