name: Build Biyatrix

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        env:
          OPENCODE_VERSION: "0.1.0"
          OPENCODE_CHANNEL: "latest"

      - name: Build all platform binaries
        run: bun run packages/opencode/script/build.ts
        env:
          OPENCODE_VERSION: "0.1.0"
          OPENCODE_CHANNEL: "latest"

      - name: Rename and stage binaries
        run: |
          mkdir -p release
          for dir in packages/opencode/dist/*/; do
            platform=$(basename "$dir")
            platform=${platform#opencode-}
            for bin in "$dir"bin/*; do
              ext=""
              [[ "$bin" == *.exe ]] && ext=".exe"
              cp "$bin" "release/biyatrix-${platform}${ext}"
            done
          done
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          name: "biyatrix v0.1.0"
          files: release/*
          draft: false
          prerelease: false
