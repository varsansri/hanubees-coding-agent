name: Build Biyatrix

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
            ext: ""
          - target: linux-arm64
            os: ubuntu-24.04-arm
            ext: ""
          - target: darwin-arm64
            os: macos-latest
            ext: ""
          - target: darwin-x64
            os: macos-13
            ext: ""
          - target: windows-x64
            os: windows-latest
            ext: ".exe"

    runs-on: ${{ matrix.os }}
    env:
      OPENCODE_VERSION: "0.1.0"
      OPENCODE_CHANNEL: "latest"

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install
        working-directory: packages/opencode

      - run: bun run script/build.ts
        working-directory: packages/opencode

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: biyatrix-${{ matrix.target }}
          path: packages/opencode/dist/biyatrix-${{ matrix.target }}/bin/biyatrix${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: biyatrix-*
          path: artifacts

      - run: |
          mkdir release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            binary=$(find "$dir" -type f | head -1)
            cp "$binary" "release/$name"
          done
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.OPENCODE_VERSION }}
          name: biyatrix v${{ env.OPENCODE_VERSION }}
          files: release/*
          draft: false
          prerelease: true
